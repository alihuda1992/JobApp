name: Supabase keep-alive

on:
  schedule:
    - cron: "0 9 */3 * *" # every 3 days at 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query database to register activity
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ne 200 ]; then
            echo "Keep-alive ping failed — project may be paused or unreachable."
            exit 1
          fi

      # GitHub suspends scheduled workflows after 60 days without repo activity.
      # If the last commit is >45 days old, push an empty heartbeat commit to reset the clock.
      - name: Keep repository active
        run: |
          last=$(git log -1 --format=%ct)
          days=$(( ($(date +%s) - last) / 86400 ))
          echo "Last commit was $days day(s) ago"
          if [ "$days" -ge 45 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep-alive heartbeat [skip ci]"
            git push
            echo "Pushed heartbeat commit to keep scheduled workflows enabled."
          fi
